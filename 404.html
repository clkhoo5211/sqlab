<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>sqlab</title>
    <!-- GitHub Pages SPA fix: redirect any deep route back to index.html -->
    <script>
      // Keep 1 path segment (the repo name: /sqlab)
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
